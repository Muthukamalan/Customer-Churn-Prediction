services:

  minio:
    image: minio/minio
    container_name: minio 
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123 
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    restart: always 
    command:
      server /data --console-address ":9001" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3


 
  # ────────────────────────────────────────────────────────────
  #  MinIO Init  —  creates the bucket once on first start
  # ────────────────────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minio minio123 &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc ls local/mlflow-artifacts &&
        echo 'Bucket mlflow-artifacts ready.'
      "
    restart: on-failure
        

  mlflow_db:
    image: postgres:17.5-alpine
    ports:
      - "5432:5432"
    container_name: mlflow_db
    environment:
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow_db
      POSTGRES_PASSWORD: mlflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/customer_churn.csv:/docker-entrypoint-initdb.d/customer_churn.csv
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh 
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  mlflow:
    # image: ghcr.io/mlflow/mlflow:v2.12.1
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    ports:
      - "5000:5000"
    restart: always 
    depends_on:
      mlflow_db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    # depends_on:
    #   - minio                 # -- store artifacts like model, datasets, mlflow.log_artifact()
    #   - mlflow_db                    # --backend-store-uri postgresql://[username]:[password]@[host]/[database]  STORE EXPERIMENT METADATA like lr, accuracy, epochs, loss
    command: >
      sh -c "pip install --upgrade mlflow psycopg2-binary boto3 && mlflow server --backend-store-uri postgresql://mlflow_db:mlflow_db@mlflow_db/mlflow_db  --host 0.0.0.0 --default-artifact-root s3://mlflow-artifacts/"
    
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - mlflow_db
    restart: always 


  # prometheus:
