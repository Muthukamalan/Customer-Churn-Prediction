services:
  # ────────────────────────────────────────────────────────────
  #  S3  —  Minio acts Object storage with S3 API Compatability
  # ────────────────────────────────────────────────────────────
  s3:
    image: minio/minio
    container_name: minio 
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    restart: always 
    command:
      server /data --console-address ":9001" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 3


 
  # ────────────────────────────────────────────────────────────
  #  MinIO Init  —  creates the bucket once on first start 
  # ────────────────────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      s3:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      sh -c "
        /usr/bin/mc --version &&
        mc alias set local ${MLFLOW_S3_ENDPOINT_COMPATIBLE} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} --api S3v4 &&
        mc mb --ignore-existing local/${BUCKET_NAME} && 
        mc ls local/${BUCKET_NAME} &&
        echo 'Bucket ${BUCKET_NAME} ready.'
      "
    # mc anonymous set download local/mlflow-artifacts to get publcly accessed
    restart: on-failure
        
  # ────────────────────────────────────────────────────────────
  #  DB —  Mlflow DB backed by Postgres to store Metadata
  # ────────────────────────────────────────────────────────────
  db:
    image: postgres:17.5-alpine
    ports:
      - "5432:5432"
    container_name: mlflow_db
    environment:
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow_db
      POSTGRES_PASSWORD: mlflow_db
      TZ: Asia/Kolkata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/customer_churn.csv:/docker-entrypoint-initdb.d/customer_churn.csv
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh 
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-p", "5432", "-U", "mlflow_db"]   # 5432 {PORT}, mlflow_db {PG_USER} 
      interval: 10s
      timeout: 5s
      retries: 5


  # ─────────────────────────────────────────────────────────────────────────
  #  Postgresql Exporter -  Exposes Postgres Metrics for Prometheus to scrape
  # ─────────────────────────────────────────────────────────────────────────
  postgresql_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgresl_exporter
    ports:
      - "9187:9187"
    environment:
      # - DATA_SOURCE_NAME="postgres://${{DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}?sslmode=disable}"
      DATA_SOURCE_NAME: "postgresql://mlflow_db:mlflow_db@db:5432/mlflow_db?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: always



  # ─────────────────────────────────────────────────────────────────────
  #  Tracking Server —  Mlflow helps to communicate Metadata & Artifacts
  # ─────────────────────────────────────────────────────────────────────
  tracking_server:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow_server
    ports:
      - "5000:5000"
    restart: always 
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_COMPATIBLE}
      - MLFLOW_S3_IGNORE_TLS=${MLFLOW_S3_IGNORE_TLS}
      - MLFLOW_ARTIFACTS_DESTINATION=${MLFLOW_ARTIFACTS_DESTINATION}
    command: >
      sh -c "pip install --upgrade mlflow psycopg2-binary boto3 &&  mlflow server --backend-store-uri postgresql://mlflow_db:mlflow_db@db:5432/mlflow_db --host 0.0.0.0 --port 5000 --serve-artifacts --artifacts-destination ${MLFLOW_ARTIFACTS_DESTINATION}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
    

  # ─────────────────────────────────────────────────────────────────────
  #  Pgadmin: UI for the Postgres DB and MLflow MetaData
  # ─────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ui
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - MASTER_PASSWORD_REQUIRED=False
    volumes:
      - ./postgres/servers.json:/pgadmin4/servers.json
    depends_on:
      - db
    restart: always 

  # ─────────────────────────────────────────────────────────────────────
  #  Prometheus:
  # ─────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:9090"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml

  # ─────────────────────────────────────────────────────────────────────
  #  Grafana:
  # ─────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:main-slim
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

  
volumes:
  minio_data:
  postgres_data:
  grafana_data:


