# ==============================================================================
# Ruff Configuration
# Docs: https://docs.astral.sh/ruff/
# ==============================================================================

# Target Python version
target-version = "py311"

# Max line length (Black-compatible default)
line-length = 88

# Files/directories to exclude
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-repoinfo",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "migrations",        # Django/Alembic auto-generated migrations
    "*.pyi",             # Stub files
]

# Files to include (defaults to all .py files)
include = ["*.py", "*.pyw"]

# ==============================================================================
# Linting Rules
# ==============================================================================

[lint]

# Rule sets to enable
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes (unused imports, undefined names, etc.)
    "I",      # isort (import sorting)
    "B",      # flake8-bugbear (likely bugs and design issues)
    "C4",     # flake8-comprehensions (better list/dict/set comprehensions)
    "UP",     # pyupgrade (modernise Python syntax)
    "N",      # pep8-naming conventions
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "RUF",    # Ruff-specific rules
    "PD",     # pandas-vet (pandas best practices)
    "NPY",    # NumPy-specific rules
    "PT",     # flake8-pytest-style
    "LOG",    # flake8-logging
    "G",      # flake8-logging-format
    "PIE",    # flake8-pie (misc. improvements)
    "RET",    # flake8-return
    "ARG",    # flake8-unused-arguments
    "ERA",    # eradicate (commented-out code)
    "PERF",   # Perflint (performance anti-patterns)
]

# Rules to ignore globally
ignore = [
    "E501",   # Line too long — handled by formatter
    "B008",   # Do not perform function call in default arg (common in FastAPI/Typer)
    "N803",   # Argument name should be lowercase (X, y are ML conventions)
    "N806",   # Variable in function should be lowercase (X_train etc.)
    "PD901",  # Avoid using `df` as variable name — too common in ML code
    "ERA001", # Commented-out code — can be noisy during development
    "ARG002", # Unused method argument — common with abstract base classes
    "RET504", # Unnecessary assignment before return — sometimes improves readability
]

# Rules to treat as auto-fixable
fixable = ["ALL"]

# Rules that should never be auto-fixed (too risky)
unfixable = [
    "F841",   # Local variable assigned but never used — fix manually
    "ERA001", # Commented-out code — review before deleting
]

# Allow unused variables prefixed with underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+_*))$"

# Per-file rule overrides
[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",   # Allow assert statements in tests
    "ARG",    # Unused arguments common in fixtures
    "FBT",    # Boolean args common in test parametrize
    "PT",     # Relax pytest style in test files
]
"scripts/**/*.py" = [
    "T201",   # Allow print() in scripts
    "INP001", # Scripts don't need __init__.py
]
"__init__.py" = [
    "F401",   # Allow unused imports in __init__.py (re-exports)
]
"conf/**/*.py" = [
    "F401",   # Hydra config files often import for side effects
]
"notebooks/**/*.py" = [
    "T201",   # Allow print in notebooks
    "E402",   # Module level import not at top
    "F401",   # Allow unused imports in notebooks
]

# ==============================================================================
# isort — Import Sorting
# ==============================================================================

[lint.isort]

# Number of blank lines between import sections
lines-after-imports = 2
lines-between-types = 1

# Force imports to be sorted by type within each section
force-sort-within-sections = false

# Use single-line imports per symbol (vs grouped)
force-single-line = false

# Combine `from x import y, z` onto one line when possible
combine-as-imports = true

# Split on trailing comma (useful for long import lists)
split-on-trailing-comma = true

# Treat these as first-party packages (adjust to your project)
known-first-party = [
    "src",
    "app",
    "core",
    "config",
    "utils",
    "models",
    "pipelines",
    "features",
]

# Treat these as third-party (avoids misclassification)
known-third-party = [
    "mlflow",
    "sklearn",
    "pandas",
    "numpy",
    "scipy",
    "matplotlib",
    "seaborn",
    "hydra",
    "omegaconf",
    "pydantic",
    "fastapi",
    "sqlalchemy",
    "alembic",
    "pytest",
    "loguru",
]

# Section order
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

# ==============================================================================
# pycodestyle
# ==============================================================================

[lint.pycodestyle]
max-doc-length = 100

# ==============================================================================
# pep8-naming
# ==============================================================================

[lint.pep8-naming]
# Allow these variable name patterns (ML conventions)
ignore-names = [
    "X", "X_train", "X_test", "X_val",
    "y", "y_train", "y_test", "y_val", "y_pred",
    "df", "df_*",
]

# ==============================================================================
# flake8-bugbear
# ==============================================================================

[lint.flake8-bugbear]
# Allow default mutable arguments only for these patterns
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Header"]

# ==============================================================================
# flake8-tidy-imports
# ==============================================================================

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"   # Disallow `from ../../module import x`

# ==============================================================================
# flake8-logging
# ==============================================================================

# [lint.flake8-logging]
# Enforce use of __name__ in getLogger calls
# i.e., logging.getLogger(__name__)

# ==============================================================================
# Formatter (replaces Black)
# ==============================================================================

[format]

# Use double quotes (Black default)
quote-style = "double"

# Use spaces for indentation (not tabs)
indent-style = "space"

# Respect trailing commas when formatting collections
skip-magic-trailing-comma = false

# Auto-detect line endings
line-ending = "auto"

# Format code blocks inside docstrings
docstring-code-format = true
docstring-code-line-length = 88