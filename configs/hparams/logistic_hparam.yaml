# @package _global_

defaults:
  - override /model: logistic_regression
  - override /hparams: logistic_regression
  - override /hydra/sweeper: optuna
  - _self_

hydra:
  mode: "MULTIRUN"
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    study_name: logistic_regression_study
    n_jobs: 1
    direction: maximize
    n_trials: 20
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 1234
      n_startup_trials: 10
    params:
      model.C: interval(0.0001, 0.1)
      model.solver: choice('lbfgs', 'liblinear')
      model.max_iter: choice(100, 200, 300)
