# @package _global_

defaults:
  - override /model: kneighbors
  - override /hparams: kneighbors_hparam
  - override /hydra/sweeper: optuna
  - _self_

hydra:
  mode: "MULTIRUN"
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    study_name: logistic_regression_study
    n_jobs: 1
    direction: maximize
    n_trials: 20
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 1234
      n_startup_trials: 10
    params:
      model.n_neighbors: range(1, 20, 1)
      model.weights: choice('uniform', 'distance')
      model.algorithm: choice('auto', 'ball_tree', 'kd_tree', 'brute')
      model.leaf_size: range(10, 30, 5)
      model.p: range(1, 3, 1)